name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: FranciscoDastres
          template: classic
          base: "" 
          
          # Ajustes de visualización
          config_display: regular
          config_padding: 0, 8%

          # PLUGIN: Isocalendar (Vista 3D)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year 

          # PLUGIN: Lenguajes más usados
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, render
          plugin_languages_details: bytes-size, percentage 
          plugin_languages_sections: most-used
          plugin_languages_limit: 8  # <-- Aquí estaba el error (faltaba el #)
